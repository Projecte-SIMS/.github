name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Releases en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando actualización resiliente..."
            
            # 1. Localizar el directorio del proyecto
            PROJECT_ROOT="/home/${{ secrets.SSH_USER }}/sims-project"
            if [ ! -d "$PROJECT_ROOT" ]; then
              PROJECT_ROOT="$HOME/sims-project"
            fi
            
            cd "$PROJECT_ROOT" || { echo "❌ Carpeta del proyecto no encontrada en $PROJECT_ROOT"; exit 1; }
            echo "📍 Directorio actual: $(pwd)"
            ls -F

            # 2. Función para streaming directo a Docker
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME desde $URL..."
                curl -L "$URL" | docker load
              else
                echo "⚠️ No se encontró release de $NAME"
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Reiniciando contenedores..."
            # Detección explícita del archivo
            if [ -f "docker-compose.prod.yml" ]; then
                CONF="docker-compose.prod.yml"
            elif [ -f "docker-compose.yml" ]; then
                CONF="docker-compose.yml"
            else
                # Buscar cualquier archivo que parezca un docker-compose
                CONF=$(ls docker-compose*.yml 2>/dev/null | head -n 1)
            fi

            if [ -z "$CONF" ]; then
                echo "❌ Error: No se encontró ningún archivo docker-compose en $(pwd)"
                ls -la
                exit 1
            fi

            echo "📁 Usando archivo: $CONF"
            docker compose -f "$CONF" up -d

            echo "⚙️ Ejecutando migraciones..."
            # Esperar a que el backend esté arriba
            sleep 15
            docker exec sims-backend php artisan migrate --force || echo "⚠️ Falló migración base"
            docker exec sims-backend php artisan tenants:migrate --force || echo "⚠️ Falló migración multitenant"

            echo "✨ Limpieza final..."
            docker image prune -f
            echo "✅ ¡Actualización completada con éxito!"
