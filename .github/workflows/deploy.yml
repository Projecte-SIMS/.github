name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Releases en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            echo "🚀 Iniciando actualización optimizada (AMD64)..."
            cd ~/sims-project
            
            # 0. Verificar espacio y limpiar
            echo "📊 Espacio en disco inicial:"
            df -h .
            mkdir -p releases
            rm -f releases/*.tar
            
            # Función para procesar componente (Descarga -> Carga -> Borra)
            process_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📦 Descargando $NAME desde $URL..."
                curl -L "$URL" -o "releases/$NAME.tar"
                echo "📥 Cargando $NAME en Docker..."
                docker load -i "releases/$NAME.tar"
                echo "🗑️ Borrando archivo temporal $NAME.tar..."
                rm "releases/$NAME.tar"
              else
                echo "⚠️ No se encontró release de $NAME para amd64"
              fi
            }

            # Procesar uno a uno para ahorrar espacio
            process_component "Backend" "Backend"
            process_component "Frontend" "Frontend"
            process_component "IoT" "IoT"

            echo "🔄 Reiniciando contenedores con nuevas imágenes..."
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Limpiando imágenes antiguas (prune)..."
            docker image prune -a -f

            echo "📊 Espacio en disco final:"
            df -h .
            echo "✅ ¡Sistema actualizado con éxito!"
