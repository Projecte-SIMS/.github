name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Releases en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 Iniciando actualización desde GitHub Releases (AMD64)..."
            cd ~/sims-project
            
            # Crear carpeta de releases si no existe
            mkdir -p releases
            cd releases

            echo "📦 Descargando últimas imágenes (-amd64.tar)..."
            
            # Descargar Backend AMD64
            BACKEND_URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/Backend/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
            if [ ! -z "$BACKEND_URL" ]; then
              curl -L $BACKEND_URL -o backend.tar
              echo "📥 Cargando Backend..."
              docker load -i backend.tar && rm backend.tar
            else
              echo "⚠️ No se encontró release de Backend para amd64"
            fi
            
            # Descargar Frontend AMD64
            FRONTEND_URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/Frontend/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
            if [ ! -z "$FRONTEND_URL" ]; then
              curl -L $FRONTEND_URL -o frontend.tar
              echo "📥 Cargando Frontend..."
              docker load -i frontend.tar && rm frontend.tar
            else
              echo "⚠️ No se encontró release de Frontend para amd64"
            fi

            # Descargar IoT AMD64
            IOT_URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/IoT/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
            if [ ! -z "$IOT_URL" ]; then
              curl -L $IOT_URL -o iot.tar
              echo "📥 Cargando IoT..."
              docker load -i iot.tar && rm iot.tar
            else
              echo "⚠️ No se encontró release de IoT para amd64"
            fi

            echo "🔄 Reiniciando contenedores..."
            cd ~/sims-project
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Limpiando sistema..."
            docker image prune -f

            echo "✅ ¡Sistema actualizado correctamente a la versión AMD64!"
