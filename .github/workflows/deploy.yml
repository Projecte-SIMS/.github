name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Reconstruir y Desplegar en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando reconstrucción total del sistema..."
            
            # 1. Crear y asegurar directorio del proyecto
            PROJECT_ROOT="/home/${{ secrets.SSH_USER }}/sims-project"
            mkdir -p "$PROJECT_ROOT"
            cd "$PROJECT_ROOT" || exit 1

            # 2. Obtener el archivo docker-compose.prod.yml más reciente
            # Lo descargamos del repositorio principal (asumiendo que es público)
            echo "📄 Descargando configuración Docker Compose..."
            curl -sL https://raw.githubusercontent.com/Projecte-SIMS/.github/main/docker-compose.prod.yml -o docker-compose.prod.yml
            
            # Si el anterior falló (ruta distinta), intentamos otra común
            if [ ! -s docker-compose.prod.yml ]; then
                curl -sL https://raw.githubusercontent.com/Projecte-SIMS/Backend/main/docker-compose.prod.yml -o docker-compose.prod.yml
            fi

            # 3. Función para streaming de imágenes
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME desde $URL..."
                curl -L "$URL" | docker load
              else
                echo "⚠️ No se encontró release de $NAME"
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Levantando contenedores..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⚙️ Ejecutando migraciones..."
            sleep 20
            docker exec sims-backend php artisan migrate --force || echo "⚠️ Falló migración base"
            docker exec sims-backend php artisan tenants:migrate --force || echo "⚠️ Falló migración multitenant"

            echo "✨ Limpieza final..."
            docker image prune -f
            echo "✅ ¡Sistema reconstruido y actualizado!"
