name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Imágenes Cargadas en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando despliegue de imágenes..."
            
            PROJECT_ROOT="$HOME/sims-project"
            mkdir -p "$PROJECT_ROOT/project-sims-backend"
            mkdir -p "$PROJECT_ROOT/project-sims-frontend"
            mkdir -p "$PROJECT_ROOT/Raspberry_py/server"

            # 1. Recuperar configuración Docker Compose
            cd "$PROJECT_ROOT"
            curl -sL https://raw.githubusercontent.com/Projecte-SIMS/.github/main/docker-compose.prod.yml -o docker-compose.prod.yml

            # 2. Streaming de imágenes desde GitHub a Docker
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME..."
                curl -L "$URL" | docker load
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Levantando contenedores (Sin Build)..."
            # Usamos --no-build para evitar que busque el Dockerfile
            docker compose -f docker-compose.prod.yml up -d --no-build

            echo "⚙️ Ejecutando migraciones..."
            # Esperar a que el sistema esté realmente listo
            echo "⏳ Esperando 60 segundos a que los servicios se estabilicen..."
            sleep 60
            
            if [ "$(docker inspect -f '{{.State.Running}}' sims-backend)" = "true" ]; then
                echo "🚀 Ejecutando migraciones base..."
                docker exec sims-backend php artisan migrate --force || echo "⚠️ Falló migración base"
                
                echo "🚀 Ejecutando migraciones multitenant..."
                if ! docker exec sims-backend php artisan tenants:migrate --force; then
                    echo "⚠️ No se encontraron inquilinos. Inicializando inquilino 'demo'..."
                    docker exec sims-backend php artisan db:seed --class=CentralSeeder
                    
                    echo "🔧 Forzando creación manual de esquema 'tenant_demo'..."
                    # Intentamos crear el esquema directamente en Postgres por si el seeder no lo disparó
                    docker exec sims-db psql -U postgres -c "CREATE SCHEMA IF NOT EXISTS tenant_demo;" || \
                    docker exec sims-db psql -U project_user -d project_sims -c "CREATE SCHEMA IF NOT EXISTS tenant_demo;"
                    
                    echo "🔄 Reintentando migración multitenant..."
                    docker exec sims-backend php artisan tenants:migrate --force
                fi
            else
                echo "❌ Error: El contenedor sims-backend no está en ejecución."
                docker logs sims-backend --tail 50
                exit 1
            fi

            echo "✨ Limpieza final..."
            docker image prune -f
            echo "✅ ¡Sistema actualizado y en marcha!"
