name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Releases en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 Iniciando actualización desde GitHub Releases..."
            cd ~/sims-project
            
            # Crear carpeta de releases si no existe
            mkdir -p releases
            cd releases

            echo "📦 Descargando últimas imágenes (.tar)..."
            
            # Descargar Backend
            BACKEND_URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/Backend/releases/latest | grep "browser_download_url.*tar" | cut -d '"' -f 4)
            curl -L $BACKEND_URL -o backend.tar
            
            # Descargar Frontend
            FRONTEND_URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/Frontend/releases/latest | grep "browser_download_url.*tar" | cut -d '"' -f 4)
            curl -L $FRONTEND_URL -o frontend.tar

            # Descargar IoT
            IOT_URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/IoT/releases/latest | grep "browser_download_url.*tar" | cut -d '"' -f 4)
            curl -L $IOT_URL -o iot.tar

            echo "📥 Cargando imágenes en Docker..."
            docker load -i backend.tar
            docker load -i frontend.tar
            docker load -i iot.tar

            echo "🔄 Reiniciando contenedores..."
            cd ~/sims-project
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Limpiando archivos temporales..."
            rm releases/*.tar
            docker image prune -f

            echo "✅ ¡Sistema actualizado correctamente a la última versión!"
