name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 Iniciando despliegue en SIMS Server..."
            # Entrar en la carpeta del proyecto (ajustar si es diferente)
            cd ~/SIMS_SPRINT4 || cd ~/project
            
            # 1. Bajar servicios actuales
            docker compose down
            
            # 2. Actualizar desde Git
            git pull origin main
            
            # 3. Levantar con build para asegurar imágenes frescas
            docker compose up -d --build
            
            # 4. Ejecutar migraciones multitenant
            docker exec sims-backend php artisan migrate --force
            docker exec sims-backend php artisan tenants:migrate --force
            
            # 5. Limpiar sistema
            docker image prune -f
            
            echo "✅ Despliegue completado con éxito."
