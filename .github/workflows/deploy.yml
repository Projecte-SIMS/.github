name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Reconstruir y Desplegar con .env existente
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando reconstrucción y recuperación de .env..."
            
            # 1. Preparar directorios
            PROJECT_ROOT="$HOME/sims-project"
            mkdir -p "$PROJECT_ROOT/project-sims-backend"
            mkdir -p "$PROJECT_ROOT/project-sims-frontend"

            # 2. Intentar recuperar el .env actual del servidor
            echo "🔍 Buscando archivo .env existente..."
            if [ -f "$HOME/project-sims-backend/.env" ]; then
                cp "$HOME/project-sims-backend/.env" "$PROJECT_ROOT/project-sims-backend/.env"
                echo "✅ .env recuperado desde ~/project-sims-backend/.env"
            else
                echo "⚠️ No se encontró .env en la ruta indicada. Buscando en el resto del servidor..."
                FOUND_ENV=$(find $HOME -name ".env" -not -path "*/sims-project/*" | head -n 1)
                if [ ! -z "$FOUND_ENV" ]; then
                    cp "$FOUND_ENV" "$PROJECT_ROOT/project-sims-backend/.env"
                    echo "✅ .env recuperado desde $FOUND_ENV"
                else
                    echo "❌ No se encontró ningún archivo .env en el servidor."
                fi
            fi

            # 3. Descargar configuración Docker Compose
            cd "$PROJECT_ROOT"
            echo "📄 Descargando docker-compose.prod.yml..."
            curl -sL https://raw.githubusercontent.com/Projecte-SIMS/.github/main/docker-compose.prod.yml -o docker-compose.prod.yml

            # 4. Streaming de imágenes
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME desde $URL..."
                curl -L "$URL" | docker load
              else
                echo "⚠️ No se encontró release de $NAME"
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Levantando contenedores..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⚙️ Ejecutando migraciones..."
            sleep 20
            docker exec sims-backend php artisan migrate --force || echo "⚠️ Falló migración base"
            docker exec sims-backend php artisan tenants:migrate --force || echo "⚠️ Falló migración multitenant"

            echo "✨ Limpieza final..."
            docker image prune -f
            echo "✅ ¡Sistema reconstruido y actualizado!"
