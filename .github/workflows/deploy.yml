name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Releases en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando actualización ultra-optimizada..."
            
            # Definir ruta absoluta para evitar errores
            PROJECT_DIR="/home/${{ secrets.SSH_USER }}/sims-project"
            cd $PROJECT_DIR || { echo "❌ No se encontró la carpeta $PROJECT_DIR"; exit 1; }

            echo "📊 Estado del disco:"
            df -h .

            # Función para streaming directo a Docker
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME directamente a Docker..."
                curl -L "$URL" | docker load
              else
                echo "⚠️ No se encontró release de $NAME para amd64"
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Reiniciando contenedores..."
            # Buscar el archivo de compose dinámicamente si el nombre varía
            COMPOSE_FILE="docker-compose.prod.yml"
            if [ ! -f "$COMPOSE_FILE" ]; then
                COMPOSE_FILE=$(ls docker-compose*.yml | head -n 1)
            fi
            
            echo "📁 Usando archivo de configuración: $COMPOSE_FILE"
            docker compose -f $COMPOSE_FILE up -d

            echo "⚙️ Ejecutando migraciones..."
            docker exec sims-backend php artisan migrate --force || echo "⚠️ Error en migraciones base"
            docker exec sims-backend php artisan tenants:migrate --force || echo "⚠️ Error en migraciones multitenant"

            echo "✨ Limpieza final de imágenes huérfanas..."
            docker image prune -f

            echo "✅ ¡Sistema actualizado y en marcha!"
