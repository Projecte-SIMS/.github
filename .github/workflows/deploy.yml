name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Desplegar Releases en Servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando actualización ultra-optimizada (Streaming)..."
            cd ~/sims-project
            
            echo "🧹 Limpieza agresiva inicial para liberar espacio..."
            docker system prune -a -f --volumes || true
            
            echo "📊 Espacio en disco tras limpieza:"
            df -h .
            
            # Función para procesar componente vía Pipe (Internet -> Docker)
            # Esto NO guarda el archivo .tar en disco, ahorrando mucho espacio.
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME directamente a Docker..."
                curl -L "$URL" | docker load
              else
                echo "⚠️ No se encontró release de $NAME para amd64"
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Reiniciando contenedores..."
            docker compose -f docker-compose.prod.yml up -d

            echo "✨ Limpieza final..."
            docker image prune -f

            echo "📊 Espacio en disco final:"
            df -h .
            echo "✅ ¡Sistema actualizado con éxito mediante streaming!"
