name: CD - Despliegue Automático SIMS

on:
  workflow_run:
    workflows: ["CI - Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Reconstruir y Desplegar con recuperación de .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            echo "🚀 Iniciando despliegue con búsqueda de configuración..."
            
            PROJECT_ROOT="$HOME/sims-project"
            mkdir -p "$PROJECT_ROOT/project-sims-backend"
            mkdir -p "$PROJECT_ROOT/project-sims-frontend"

            echo "🔍 Localizando archivo .env..."
            # 1. Si está en la raíz de sims-project, moverlo a la carpeta del backend
            if [ -f "$PROJECT_ROOT/.env" ]; then
                mv "$PROJECT_ROOT/.env" "$PROJECT_ROOT/project-sims-backend/.env"
                echo "✅ .env movido de la raíz a project-sims-backend/"
            fi

            # 2. Si no está, buscar en las rutas probables que vimos en el ls
            if [ ! -f "$PROJECT_ROOT/project-sims-backend/.env" ]; then
                if [ -f "$HOME/.env" ]; then
                    cp "$HOME/.env" "$PROJECT_ROOT/project-sims-backend/.env"
                    echo "✅ .env copiado desde $HOME"
                elif [ -f "$HOME/project-sims-backend/.env" ]; then
                    cp "$HOME/project-sims-backend/.env" "$PROJECT_ROOT/project-sims-backend/.env"
                    echo "✅ .env copiado desde carpeta backend externa"
                fi
            fi

            # Asegurar que el .env del frontend también existe (aunque sea vacío o básico)
            if [ ! -f "$PROJECT_ROOT/project-sims-frontend/.env" ]; then
                echo "VITE_API_URL=http://185.13.77.175:8000/api" > "$PROJECT_ROOT/project-sims-frontend/.env"
            fi

            cd "$PROJECT_ROOT"
            echo "📄 Descargando docker-compose.prod.yml actualizado..."
            curl -sL https://raw.githubusercontent.com/Projecte-SIMS/.github/main/docker-compose.prod.yml -o docker-compose.prod.yml

            # Streaming de imágenes
            stream_component() {
              NAME=$1
              REPO=$2
              URL=$(curl -s https://api.github.com/repos/Projecte-SIMS/$REPO/releases/latest | grep "browser_download_url.*-amd64\.tar" | cut -d '"' -f 4 | head -n 1)
              
              if [ ! -z "$URL" ]; then
                echo "📥 Transmitiendo $NAME..."
                curl -L "$URL" | docker load
              else
                echo "⚠️ No se encontró release de $NAME"
              fi
            }

            stream_component "Backend" "Backend"
            stream_component "Frontend" "Frontend"
            stream_component "IoT" "IoT"

            echo "🔄 Levantando contenedores..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⚙️ Ejecutando migraciones..."
            sleep 20
            docker exec sims-backend php artisan migrate --force || echo "⚠️ Falló migración base"
            docker exec sims-backend php artisan tenants:migrate --force || echo "⚠️ Falló migración multitenant"

            echo "✨ Limpieza final..."
            docker image prune -f
            echo "✅ ¡Despliegue finalizado!"
